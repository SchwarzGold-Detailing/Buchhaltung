<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SoloBuch — Buchhaltung für Einzel- und Kleinunternehmer</title>
<!-- "Zum Home-Bildschirm hinzufügen" auf iOS/Android: Vollbild ohne Browserleiste, eigenes Icon -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SoloBuch">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#184f95">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --surface-1:#fcfcfb;
    --page:#f9f9f7;
    --ink-1:#0b0b0b;
    --ink-2:#52514e;
    --ink-muted:#898781;
    --grid:#e1e0d9;
    --baseline:#c3c2b7;
    --border:rgba(11,11,11,0.10);
    --brand:#184f95;
    --brand-2:#256abf;
    --brand-light:#cde2fb;
    --good:#0ca30c;
    --warning:#fab219;
    --serious:#ec835a;
    --critical:#d03b3b;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background:var(--page);
    color:var(--ink-1);
    font-size:15px;
  }
  button{font-family:inherit;}
  input,select{font-family:inherit;}
  /* ---------- Layout ---------- */
  #app-shell{display:none; min-height:100vh;}
  #app-shell.active{display:flex;}
  .sidebar{
    width:220px; flex:0 0 220px; background:var(--surface-1);
    border-right:1px solid var(--border); padding:20px 14px;
    display:flex; flex-direction:column; gap:4px;
  }
  .brand{display:flex; align-items:center; gap:8px; padding:6px 10px 20px 10px;}
  .brand .logo{width:28px;height:28px;border-radius:8px;background:var(--brand);flex:0 0 28px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;}
  .brand .name{font-weight:700; font-size:16px; color:var(--ink-1);}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
    color:var(--ink-2); cursor:pointer; font-size:14px; font-weight:500; user-select:none;
  }
  .nav-item:hover{background:var(--page);}
  .nav-item.active{background:var(--brand-light); color:var(--brand); font-weight:700;}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0;}
  .nav-item.active .dot{opacity:1;}
  .sidebar-footer{margin-top:auto; padding-top:14px; border-top:1px solid var(--border);}
  .badge-mode{
    font-size:11px; color:var(--ink-muted); padding:8px 10px; line-height:1.4;
  }
  .badge-mode strong{color:var(--ink-2); display:block; font-size:12px;}
  .main{flex:1; padding:28px 36px; max-width:1100px; overflow-y:auto;}
  .bottom-nav{display:none;}
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px;}
  .topbar h1{font-size:22px; margin:0 0 4px 0;}
  .topbar p{margin:0; color:var(--ink-2); font-size:13.5px;}
  .lang-toggle{display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; height:32px;}
  .lang-toggle button{
    border:none; background:var(--surface-1); padding:0 12px; font-size:12.5px; font-weight:600;
    color:var(--ink-2); cursor:pointer;
  }
  .lang-toggle button.active{background:var(--brand); color:#fff;}
  /* ---------- Cards / KPIs ---------- */
  .kpi-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
  .card{
    background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px;
  }
  .kpi .label{font-size:12px; color:var(--ink-muted); font-weight:600; text-transform:uppercase; letter-spacing:.02em;}
  .kpi .value{font-size:24px; font-weight:700; margin-top:6px;}
  .kpi .sub{font-size:12.5px; color:var(--ink-2); margin-top:4px;}
  .profit-eq{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:14px;}
  .profit-item{flex:1; min-width:130px;}
  .profit-item.result{border-color:var(--brand); background:var(--brand-light);}
  .profit-item.result .value{color:var(--brand); font-size:28px;}
  .profit-op{font-size:22px; color:var(--ink-muted); font-weight:300;}
  .profit-footnote{margin:0; font-size:12.5px; color:var(--ink-2); line-height:1.55;}
  .status-pill{
    display:inline-flex; align-items:center; gap:6px; padding:3px 10px 3px 8px; border-radius:999px;
    font-size:12.5px; font-weight:700;
  }
  .status-pill .swatch{width:8px;height:8px;border-radius:50%;}
  .status-good{background:rgba(12,163,12,0.10); color:#0a7f0a;}
  .status-good .swatch{background:var(--good);}
  .status-warning{background:rgba(250,178,25,0.16); color:#8a5c00;}
  .status-warning .swatch{background:var(--warning);}
  .status-critical{background:rgba(208,59,59,0.10); color:var(--critical);}
  .status-critical .swatch{background:var(--critical);}
  .progress-wrap{margin-top:10px;}
  .progress-track{height:8px; border-radius:6px; background:var(--grid); overflow:hidden;}
  .progress-fill{height:100%; border-radius:6px; background:var(--brand-2); transition:width .3s ease;}
  .progress-fill.warning{background:var(--warning);}
  .progress-fill.critical{background:var(--critical);}
  .progress-caption{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-muted); margin-top:5px;}
  section.block{margin-bottom:28px;}
  section.block h2{font-size:15px; margin:0 0 12px 0;}
  .two-col{display:grid; grid-template-columns:1.3fr 1fr; gap:16px;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11.5px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:.02em;
     font-weight:600; padding:8px 10px; border-bottom:1px solid var(--grid);}
  td{padding:9px 10px; border-bottom:1px solid var(--grid); color:var(--ink-1);}
  tr:last-child td{border-bottom:none;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .muted{color:var(--ink-muted);}
  .empty-row td{color:var(--ink-muted); text-align:center; padding:22px 10px; font-size:13px;}
  .btn{
    border:none; border-radius:8px; padding:9px 16px; font-size:13.5px; font-weight:700; cursor:pointer;
    background:var(--brand); color:#fff;
  }
  .btn:hover{background:var(--brand-2);}
  .btn.secondary{background:var(--page); color:var(--ink-1); border:1px solid var(--border);}
  .btn.secondary:hover{background:#efeee9;}
  .btn.small{padding:6px 11px; font-size:12.5px;}
  .btn.danger{background:#fff; color:var(--critical); border:1px solid rgba(208,59,59,0.35);}
  .btn-row{display:flex; gap:10px; margin-top:16px;}
  .section-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .note{
    background:var(--brand-light); border:1px solid rgba(24,79,149,0.18); border-radius:8px;
    padding:11px 14px; font-size:13px; color:#123b70; line-height:1.5;
  }
  .note.warn{background:rgba(250,178,25,0.14); border-color:rgba(250,178,25,0.35); color:#7a5200;}
  .note.plain{background:var(--page); border-color:var(--border); color:var(--ink-2);}
  /* ---------- Onboarding ---------- */
  #onboarding{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px;
  }
  .wizard{width:560px; max-width:100%;}
  .wizard-steps{display:flex; gap:6px; margin-bottom:22px;}
  .wizard-steps div{height:4px; flex:1; border-radius:3px; background:var(--grid);}
  .wizard-steps div.done{background:var(--brand);}
  .wizard-card{background:var(--surface-1); border:1px solid var(--border); border-radius:14px; padding:30px 32px;}
  .wizard-card h2{margin:0 0 6px 0; font-size:19px;}
  .wizard-card>p.lead{color:var(--ink-2); font-size:13.5px; margin:0 0 22px 0;}
  .choice-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .choice-card{
    border:1.5px solid var(--border); border-radius:10px; padding:16px; cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .choice-card:hover{border-color:var(--brand-2);}
  .choice-card.selected{border-color:var(--brand); background:var(--brand-light);}
  .choice-card .title{font-weight:700; font-size:14.5px; margin-bottom:4px;}
  .choice-card .desc{font-size:12.5px; color:var(--ink-2); line-height:1.45;}
  .field{margin-top:16px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-2); margin-bottom:6px;}
  .field input, .field select{
    width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--border); font-size:13.5px;
    background:#fff; color:var(--ink-1);
  }
  .checkbox-row{display:flex; gap:9px; align-items:flex-start; margin-top:14px; font-size:13px; color:var(--ink-2); line-height:1.5;}
  .checkbox-row input{margin-top:3px;}
  /* ---------- Modal ---------- */
  .modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(11,11,11,0.35); align-items:center; justify-content:center; z-index:50;
  }
  .modal-backdrop.active{display:flex;}
  .modal{width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; background:var(--surface-1); border-radius:14px; padding:26px 28px;}
  .modal h3{margin:0 0 4px 0; font-size:17px;}
  .modal p.lead{margin:0 0 18px 0; color:var(--ink-2); font-size:13px;}
  .modal-close{float:right; border:none; background:none; font-size:18px; color:var(--ink-muted); cursor:pointer;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  pre.code-block{
    background:#0d0d0d; color:#d7f7d7; padding:14px; border-radius:8px; font-size:11.5px;
    overflow-x:auto; max-height:280px; white-space:pre-wrap; word-break:break-all;
  }
  .tag{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:var(--page); color:var(--ink-2); border:1px solid var(--border);}
  .position-row{display:grid; grid-template-columns:2fr 0.7fr 1fr auto; gap:8px; align-items:end;}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  /* ---------- Mobile (phone) layout ---------- */
  @media (max-width:720px){
    body{font-size:15.5px;}
    #app-shell.active{flex-direction:column;}
    .sidebar{
      width:100%; flex:0 0 auto; flex-direction:row; align-items:center; justify-content:space-between;
      border-right:none; border-bottom:1px solid var(--border); padding:12px 16px;
    }
    .sidebar .nav-item{display:none;}
    .sidebar .brand{padding:0;}
    .sidebar-footer{margin-top:0; padding-top:0; border-top:none;}
    .badge-mode{padding:0; text-align:right;}
    .main{padding:18px 16px 90px 16px; max-width:100%;}
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .two-col{grid-template-columns:1fr;}
    .profit-eq{flex-direction:column; align-items:stretch; gap:8px;}
    .profit-op{display:none;}
    .choice-grid{grid-template-columns:1fr;}
    .wizard-card{padding:22px 18px;}
    #onboarding{padding:18px; align-items:flex-start; padding-top:36px;}
    .modal{width:94vw; max-height:85vh; padding:20px;}
    .grid-2{grid-template-columns:1fr;}
    .position-row{grid-template-columns:1fr; gap:6px;}
    table{font-size:12.5px;}
    th, td{padding:8px 6px;}
    .topbar{flex-wrap:wrap; gap:10px;}
    .topbar h1{font-size:19px;}
    .kpi-row{gap:10px;}
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index:30;
      background:var(--surface-1); border-top:1px solid var(--border);
      padding:4px 4px calc(4px + env(safe-area-inset-bottom,0px)) 4px;
      justify-content:space-around;
    }
    .bottom-nav-item{
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:2px; padding:8px 4px 6px 4px; color:var(--ink-muted); font-size:11px; font-weight:600;
      cursor:pointer; border-top:2px solid transparent; user-select:none;
    }
    .bottom-nav-item.active{color:var(--brand); border-top-color:var(--brand); font-weight:700;}
  }
</style>
</head>

   SoloBuch — klickbarer Demo-Prototyp
   Reines Frontend, alle Daten nur im Arbeitsspeicher (kein Server, keine

/* ---------------------------- Fehler sichtbar machen ----------------------------
   Ohne das hier würde ein Fehler beim Start nur eine leere weiße Seite zeigen
   (der ganze Inhalt wird per JS gerendert). So sieht man stattdessen, was los ist. */
function showBootError(msg){
  var el = document.getElementById('boot-fallback');
  if(!el){
    el = document.createElement('div');
    el.id = 'boot-fallback';
    document.body.prepend(el);
  }
  el.style.cssText = 'font-family:system-ui,sans-serif; max-width:520px; margin:40px auto; padding:20px; text-align:left; color:#0b0b0b; background:#fff3f3; border:1px solid #e8b4b4; border-radius:12px; white-space:pre-wrap; font-size:14px;';
  el.textContent = 'Es gab ein Problem beim Start der App:\n\n' + msg + '\n\nBitte mach einen Screenshot von dieser Meldung.';
}
window.addEventListener('error', function(e){
  showBootError((e && e.message) ? e.message : String(e));
});
const state = {
  lang: 'de',
  onboarded: false,
  step: 1,
  status: null,          // 'einzel' | 'neben'
  hauptjobIncome: 0,
  ustModel: null,        // 'klein' | 'regel'
  bindingAck: false,
  gruendung: todayISO(),
  screen: 'dashboard',
  invoices: [],
  expenses: [],
  invoiceCounter: 0,
  profile: { name:'', strasse:'', plzOrt:'', steuernummer:'' }
};
function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function fmtMoney(n){
  return new Intl.NumberFormat(state.lang==='de' ? 'de-DE' : 'en-DE', {style:'currency', currency:'EUR'}).format(n||0);
}
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return new Intl.DateTimeFormat(state.lang==='de' ? 'de-DE' : 'en-GB').format(d);
}

/* ---------------------------- Tax reserve calc ---------------------------- */
// Simplified 2026 approximation of the German progressive income tax (Grundtabelle).
// NOT the exact §32a formula — piecewise-linear approximation for demo purposes.
function estimateMarginalRate(income){
  const brackets = [
    {upTo:12348, rate:0.00},
    {upTo:17799, rate:0.16},
    {upTo:29000, rate:0.24},
    {upTo:45000, rate:0.31},
    {upTo:68500, rate:0.37},
    {upTo:280000, rate:0.42},
    {upTo:Infinity, rate:0.45},
  ];
  for(const b of brackets){ if(income <= b.upTo) return b.rate; }
  return 0.45;
}
function computeReserve(){
  const profit = totalInvoiceNetto(true) - totalExpenses();
  const base = state.status === 'neben' ? (Number(state.hauptjobIncome)||0) : 0;
  const rate = estimateMarginalRate(base + Math.max(profit,0));
  const amount = Math.max(profit,0) * rate;
  return {profit, rate, amount};
}
/* ---------------------------- Derived totals ---------------------------- */
function nettoOf(inv){
  if(Array.isArray(inv.positionen)){
    return inv.positionen.reduce((s,p)=> s + (Number(p.menge||0) * Number(p.preis||0)), 0);
  }
  return Number(inv.netto||0); // backward compat
}
function totalInvoiceNetto(onlyPaidOrAll){
  return state.invoices.reduce((s,i)=> s + nettoOf(i), 0);
}
function totalOpenInvoices(){
  return state.invoices.filter(i=>!i.bezahlt).reduce((s,i)=> s + grossOf(i), 0);
}
function totalExpenses(){
  return state.expenses.reduce((s,e)=> s + Number(e.betrag||0), 0);
}
function totalExpensesThisMonth(){
  const ym = todayISO().slice(0,7);
  return state.expenses.filter(e=>e.datum && e.datum.slice(0,7)===ym).reduce((s,e)=> s + Number(e.betrag||0),0);
}
function grossOf(inv){
  const netto = nettoOf(inv);
  if(state.ustModel==='klein') return netto;
  return netto * (1 + (Number(inv.ustSatz||0)/100));
}
function totalUstCollected(){
  if(state.ustModel!=='regel') return 0;
  return state.invoices.reduce((s,i)=> s + nettoOf(i)*(Number(i.ustSatz||0)/100), 0);
}
function profileComplete(){
  return !!(state.profile && state.profile.name && state.profile.strasse && state.profile.plzOrt && state.profile.steuernummer);
}
function totalVorsteuer(){
  return state.expenses.reduce((s,e)=> s + Number(e.vorsteuer||0), 0);
}

function suggestCategory(text){
  const low = (text||'').toLowerCase();
  for(const g of CATEGORY_KEYWORDS){ if(g.words.some(w=>low.includes(w))) return g.cat; }
  return 'other';
}

        <button class="btn" ${state.status?'':'disabled style="opacity:.4;cursor:not-allowed;"'} onclick="goStep(2)">${t('next')}</button>
      </div>
    `;
  } else if(state.step===2){
    body = `
      <h2>${t('step2_title')}</h2>
      <p class="lead">${t('step2_lead')}</p>
      <div class="choice-grid">
        <div class="choice-card ${state.ustModel==='klein'?'selected':''}" onclick="selectUst('klein')">
          <div class="title">${t('klein_title')}</div>
          <div class="desc">${t('klein_desc')}</div>
        </div>
        <div class="choice-card ${state.ustModel==='regel'?'selected':''}" onclick="selectUst('regel')">
          <div class="title">${t('regel_title')}</div>
          <div class="desc">${t('regel_desc')}</div>
        </div>
      </div>
      ${state.ustModel==='regel' ? `
        <div class="note warn" style="margin-top:16px;">${t('binding_warn')}</div>
        <div class="checkbox-row">
          <input type="checkbox" id="bindack" ${state.bindingAck?'checked':''} onchange="state.bindingAck=this.checked; renderOnboarding();">
          <label for="bindack">${t('binding_ack')}</label>
        </div>` : ''}

        <button class="btn secondary" onclick="goStep(1)">${t('back')}</button>
        <button class="btn" ${canProceedStep2()?'':'disabled style="opacity:.4;cursor:not-allowed;"'} onclick="goStep(3)">${t('next')}</button>
      </div>
    `;
  } else if(state.step===3){
    body = `
      <h2>${t('step3_title')}</h2>
      <p class="lead">${t('step3_lead')}</p>
      <div class="field">
        <label>${t('gruendung_label')}</label>

        <button class="btn secondary" onclick="goStep(2)">${t('back')}</button>

      </div>

  }

      <div style="text-align:center; margin-bottom:22px;">
        <div style="font-weight:800; font-size:20px; color:var(--brand);">${t('onboard_welcome_title')}</div>

    </div>

function canProceedStep2(){
  if(!state.ustModel) return false;
  if(state.ustModel==='regel' && !state.bindingAck) return false;
  return true;
}

/* ---------------------------- Dashboard ---------------------------- */
function renderDashboard(){
  const open = totalOpenInvoices();
  const monthExp = totalExpensesThisMonth();
  const {amount:reserve} = computeReserve();
  const revenue = totalInvoiceNetto();
  const limit = 25000;
  const pct = Math.min(100, (revenue/limit)*100);
  const pctClass = pct>=100?'critical':(pct>=80?'warning':'');
  const profit = totalInvoiceNetto() - totalExpenses() - reserve;
  let cfClass='status-good', cfLabel=t('cashflow_good');
  if(profit<0){ cfClass='status-critical'; cfLabel=t('cashflow_critical'); }
  else if(profit < totalInvoiceNetto()*0.1){ cfClass='status-warning'; cfLabel=t('cashflow_warning'); }
  const recentInv = [...state.invoices].slice(-4).reverse().map(i=>`
    <tr><td>${i.kunde}</td><td class="num">${fmtMoney(grossOf(i))}</td>
    <td>${i.bezahlt?`<span class="status-pill status-good"><span class="swatch"></span>${t('inv_paid')}</span>`
                   :`<span class="status-pill status-warning"><span class="swatch"></span>${t('inv_open')}</span>`}</td></tr>
  `).join('') || `<tr class="empty-row"><td colspan="3">${t('inv_empty')}</td></tr>`;
  const recentExp = [...state.expenses].slice(-4).reverse().map(e=>`
    <tr><td>${e.beschreibung}<div class="muted" style="font-size:11.5px;">${catLabel(e.kategorie)}</div></td>
    <td class="num">${fmtMoney(e.betrag)}</td></tr>
  `).join('') || `<tr class="empty-row"><td colspan="2">${t('exp_empty')}</td></tr>`;
  const einnahmen = totalInvoiceNetto();
  const ausgaben = totalExpenses();
  const gewinn = einnahmen - ausgaben;
  return `
    <section class="block">
      <div class="profit-eq">
        <div class="card kpi profit-item"><div class="label">${t('profit_income')}</div><div class="value">${fmtMoney(einnahmen)}</div></div>
        <div class="profit-op">&minus;</div>
        <div class="card kpi profit-item"><div class="label">${t('profit_expenses')}</div><div class="value">${fmtMoney(ausgaben)}</div></div>
        <div class="profit-op">=</div>
        <div class="card kpi profit-item result"><div class="label">${t('profit_result')}</div><div class="value">${fmtMoney(gewinn)}</div></div>
      </div>
      <p class="profit-footnote">${t('profit_note')}</p>
    </section>
    <div class="kpi-row">
      <div class="card kpi"><div class="label">${t('kpi_open_invoices')}</div><div class="value">${fmtMoney(open)}</div>
        <div class="sub">${state.invoices.filter(i=>!i.bezahlt).length} ${state.lang==='de'?'offen':'open'}</div></div>
      <div class="card kpi"><div class="label">${t('kpi_month_expenses')}</div><div class="value">${fmtMoney(monthExp)}</div></div>
      <div class="card kpi"><div class="label">${t('kpi_reserve')}</div><div class="value">${fmtMoney(reserve)}</div></div>
      <div class="card kpi">
        <div class="label">${state.lang==='de'?'Cashflow':'Cashflow'}</div>
        <div style="margin-top:8px;"><span class="status-pill ${cfClass}"><span class="swatch"></span>${cfLabel}</span></div>
      </div>
    </div>
    <section class="block card">
      <div class="section-head"><h2 style="margin:0;">${t('kpi_threshold')}</h2>
        <span class="tag">${fmtMoney(revenue)} / ${fmtMoney(limit)}</span></div>
      <div class="progress-track"><div class="progress-fill ${pctClass}" style="width:${pct}%;"></div></div>
      <div class="progress-caption"><span>${fmtDate(state.gruendung)}</span><span>${pct.toFixed(0)}%</span></div>
    </section>
    <div class="two-col">
      <section class="block card">
        <div class="section-head"><h2 style="margin:0;">${t('recent_invoices')}</h2>
          <button class="btn secondary small" onclick="goScreen('invoices')">${t('see_all')}</button></div>
        <div class="table-scroll"><table><tbody>${recentInv}</tbody></table></div>
      </section>
      <section class="block card">
        <div class="section-head"><h2 style="margin:0;">${t('recent_expenses')}</h2>
          <button class="btn secondary small" onclick="goScreen('expenses')">${t('see_all')}</button></div>
        <div class="table-scroll"><table><tbody>${recentExp}</tbody></table></div>
      </section>
    </div>
  `;
}

function saveInvoice(){
  const kunde = document.getElementById('f-kunde').value.trim();
  const kundeAnschrift = document.getElementById('f-kunde-adresse').value.trim();
  const datum = document.getElementById('f-datum').value || todayISO();
  const leistungsdatum = document.getElementById('f-leistungsdatum').value || datum;
  const ustEl = document.getElementById('f-ust');
  const ustSatz = ustEl ? Number(ustEl.value) : 0;

    id:uid(), rechnungsnummer:nextInvoiceNumber(), kunde, kundeAnschrift, datum, leistungsdatum,

    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('decode failed'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * (maxDim/w)); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * (maxDim/h)); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function handlePhotoSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  compressImage(file, 900, 0.6).then(dataUrl=>{
    pendingPhotoDataUrl = dataUrl;
    document.getElementById('photo-preview').innerHTML =
      `<img src="${dataUrl}" style="max-width:140px; max-height:140px; border-radius:8px; border:1px solid var(--border); display:block;">
       <button type="button" class="btn secondary small" style="margin-top:6px;" onclick="removePendingPhoto()">${t('photo_remove')}</button>`;
  }).catch(()=>{ alert(t('photo_too_large')); });
}
function removePendingPhoto(){
  pendingPhotoDataUrl = null;
  document.getElementById('photo-preview').innerHTML = '';
  document.getElementById('f-exp-photo').value = '';
}
function viewReceiptPhoto(id){
  const exp = state.expenses.find(e=>e.id===id);
  if(!exp || !exp.foto) return;
  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>${exp.beschreibung}</h3>
    <img src="${exp.foto}" style="width:100%; border-radius:8px; margin-top:10px;">
    <div class="btn-row"><button class="btn secondary" onclick="closeModal()">${t('cancel')}</button></div>
  `);
}
function saveExpense(){
  const beschreibung = document.getElementById('f-exp-desc').value.trim();
  const kategorie = document.getElementById('f-exp-cat').value;
  const betrag = Number(document.getElementById('f-exp-amount').value)||0;
  const datum = document.getElementById('f-exp-date').value || todayISO();
  const vstEl = document.getElementById('f-exp-vst');
  const vorsteuer = vstEl ? (Number(vstEl.value)||0) : 0;
  if(!beschreibung || betrag<=0) return;
  state.expenses.push({id:uid(), beschreibung, kategorie, betrag, datum, vorsteuer, foto:pendingPhotoDataUrl});
  pendingPhotoDataUrl = null;
  closeModal();
  renderScreen();
}
/* ---------------------------- Tax reserve screen ---------------------------- */
function renderReserve(){
  const {profit, rate, amount} = computeReserve();
  const explain = state.status==='neben' ? t('reserve_explain_neben') : t('reserve_explain_solo');
  const pct = Math.min(100, rate*100*2); // visual scale, rate maxes ~45% -> bar rarely full
  return `
    <div class="kpi-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="card kpi"><div class="label">${t('reserve_profit')}</div><div class="value">${fmtMoney(profit)}</div></div>
      <div class="card kpi"><div class="label">${t('reserve_rate')}</div><div class="value">${(rate*100).toFixed(0)}%</div></div>
      <div class="card kpi"><div class="label">${t('reserve_amount')}</div><div class="value">${fmtMoney(amount)}</div></div>
    </div>
    <section class="block card">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <p style="margin-top:16px; color:var(--ink-2); font-size:13.5px; line-height:1.6;">${explain}</p>
      <div class="note plain">${t('reserve_disclaimer')}</div>
    </section>
  `;
}
/* ---------------------------- Threshold guard ---------------------------- */
function renderThreshold(){
  if(state.ustModel!=='klein'){
    const collected = totalUstCollected();
    const vorsteuer = totalVorsteuer();
    const zahllast = collected - vorsteuer;
    return `
      <div class="note" style="margin-bottom:18px;">${t('thresh_not_applicable')}</div>
      <div class="kpi-row" style="grid-template-columns:repeat(3,1fr);">
        <div class="card kpi"><div class="label">${t('thresh_ust_owed')}</div><div class="value">${fmtMoney(collected)}</div></div>
        <div class="card kpi"><div class="label">${t('thresh_vorsteuer')}</div><div class="value">${fmtMoney(vorsteuer)}</div></div>
        <div class="card kpi"><div class="label">${t('thresh_zahllast')}</div><div class="value">${fmtMoney(zahllast)}</div></div>
      </div>
    `;
  }
  const revenue = totalInvoiceNetto();
  const limit = 25000;
  const hardLimit = 100000;
  const pct = Math.min(100, (revenue/limit)*100);
  const pctClass = pct>=100?'critical':(pct>=80?'warning':'');
  const pctHard = Math.min(100, (revenue/hardLimit)*100);
  return `
    <div class="note" style="margin-bottom:18px;">${t('thresh_no_uprating')}</div>
    <section class="block card">
      <div class="section-head"><h2 style="margin:0;">${t('thresh_year_limit')}</h2>
        <span class="tag">${fmtMoney(revenue)} / ${fmtMoney(limit)}</span></div>
      <div class="progress-track"><div class="progress-fill ${pctClass}" style="width:${pct}%;"></div></div>
      <div class="progress-caption"><span>${t('thresh_since')} ${fmtDate(state.gruendung)}</span><span>${pct.toFixed(0)}%</span></div>
    </section>
    <section class="block card">
      <div class="section-head"><h2 style="margin:0;">${t('thresh_hard_limit')}</h2>
        <span class="tag">${fmtMoney(revenue)} / ${fmtMoney(hardLimit)}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pctHard}%;"></div></div>
    </section>
  `;
}
/* ---------------------------- Settings ---------------------------- */
function renderSettings(){
  const p = state.profile;
  return `
    <section class="block card">
      <h2>${t('settings_title')}</h2>
      <table>
        <tbody>
          <tr><td>${t('settings_status')}</td><td class="num">${state.status==='neben'?t('neben_title'):t('einzel_title')}</td></tr>
          <tr><td>${t('settings_ustmodel')}</td><td class="num">${state.ustModel==='klein'?t('klein_title'):t('regel_title')}</td></tr>
          <tr><td>${t('settings_gruendung')}</td><td class="num">${fmtDate(state.gruendung)}</td></tr>
        </tbody>
      </table>
      <div class="btn-row">
        <button class="btn secondary" onclick="redoOnboarding()">${t('settings_change')}</button>
        <button class="btn secondary" onclick="resetDemo()">${t('settings_reset')}</button>
        <button class="btn danger" onclick="clearAllData()">${t('settings_clear')}</button>
      </div>
      <p class="muted" style="font-size:11.5px; margin-top:12px; margin-bottom:0;">${t('settings_storage_note')}</p>
    </section>
    <section class="block card">
      <h2>${t('backup_title')}</h2>
      <p style="color:var(--ink-2); font-size:13.5px;">${t('backup_lead')}</p>
      <div class="btn-row">
        <button class="btn" onclick="exportBackup()">${t('backup_export_btn')}</button>
        <button class="btn secondary" onclick="document.getElementById('f-backup-file').click()">${t('backup_import_btn')}</button>
        <input id="f-backup-file" type="file" accept="application/json" style="display:none;" onchange="importBackup(event)">
      </div>
    </section>
    <section class="block card">
      <h2>${t('profile_title')}</h2>
      <p style="color:var(--ink-2); font-size:13.5px;">${t('profile_lead')}</p>
      <div class="grid-2">
        <div class="field"><label>${t('f_profile_name')}</label><input id="f-profile-name" type="text" value="${(p.name||'').replace(/"/g,'&quot;')}"></div>
        <div class="field"><label>${t('f_profile_steuernummer')}</label><input id="f-profile-steuernummer" type="text" value="${(p.steuernummer||'').replace(/"/g,'&quot;')}"></div>
        <div class="field"><label>${t('f_profile_strasse')}</label><input id="f-profile-strasse" type="text" value="${(p.strasse||'').replace(/"/g,'&quot;')}"></div>
        <div class="field"><label>${t('f_profile_plzort')}</label><input id="f-profile-plzort" type="text" value="${(p.plzOrt||'').replace(/"/g,'&quot;')}"></div>
      </div>
      <div class="btn-row"><button class="btn" onclick="saveProfile()">${t('profile_save')}</button></div>
    </section>
    <section class="block card">
      <h2>${t('export_title')}</h2>
      <p style="color:var(--ink-2); font-size:13.5px;">${t('export_lead')}</p>
      <button class="btn" onclick="exportDatev()">${t('export_btn')}</button>
      <div class="note plain" style="margin-top:14px;">${t('export_note')}</div>
    </section>
  `;
}
function saveProfile(){
  state.profile = {
    name: document.getElementById('f-profile-name').value.trim(),
    strasse: document.getElementById('f-profile-strasse').value.trim(),
    plzOrt: document.getElementById('f-profile-plzort').value.trim(),
    steuernummer: document.getElementById('f-profile-steuernummer').value.trim(),
  };
  renderScreen();
}
function exportBackup(){
  const payload = {
    _type: 'solobuch-backup', _version: 1, _exportedAt: todayISO(),
    status: state.status, hauptjobIncome: state.hauptjobIncome, ustModel: state.ustModel,
    gruendung: state.gruendung, invoices: state.invoices, expenses: state.expenses,
    invoiceCounter: state.invoiceCounter, profile: state.profile, lang: state.lang,
  };
  const stamp = todayISO();
  downloadText(`solobuch-backup_${stamp}.json`, JSON.stringify(payload, null, 2));
}
function importBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ alert(t('backup_import_error')); event.target.value=''; return; }
    if(!parsed || parsed._type!=='solobuch-backup' || !Array.isArray(parsed.invoices)){
      alert(t('backup_import_error')); event.target.value=''; return;
    }
    if(!confirm(t('backup_import_confirm'))){ event.target.value=''; return; }
    state.status = parsed.status ?? state.status;
    state.hauptjobIncome = parsed.hauptjobIncome ?? state.hauptjobIncome;
    state.ustModel = parsed.ustModel ?? state.ustModel;
    state.gruendung = parsed.gruendung ?? state.gruendung;
    state.invoices = parsed.invoices ?? [];
    state.expenses = parsed.expenses ?? [];
    state.invoiceCounter = parsed.invoiceCounter ?? state.invoices.length;
    state.profile = parsed.profile ?? state.profile;
    state.lang = parsed.lang ?? state.lang;
    state.onboarded = true;
    saveState();
    alert(t('backup_import_success'));
    event.target.value='';
    renderApp();
  };
  reader.readAsText(file);
}
function clearAllData(){
  if(!confirm(t('settings_clear_confirm'))) return;
  state.invoices=[]; state.expenses=[];
  renderScreen();
}
function redoOnboarding(){
  state.onboarded=false; state.step=1;
  document.getElementById('app-shell').classList.remove('active');
  renderOnboarding();
}
function resetDemo(){
  state.invoices=[]; state.expenses=[];
  seedDemoData();
  renderScreen();
}
function exportDatev(){
  let csv = 'Belegdatum;Belegtext;Betrag;Konto;Gegenkonto;Steuerschluessel;Rechnungsnummer\n';
  state.invoices.forEach(i=>{
    const beschreibung = (i.positionen||[]).map(p=>p.beschreibung).join(' + ');
    csv += `${i.datum};${i.kunde.replace(/;/g,',')} - ${beschreibung.replace(/;/g,',')};${grossOf(i).toFixed(2)};1200;8400;${state.ustModel==='klein'?0:(i.ustSatz||0)};${i.rechnungsnummer||''}\n`;
  });
  state.expenses.forEach(e=>{
    csv += `${e.datum};${e.beschreibung.replace(/;/g,',')};-${Number(e.betrag).toFixed(2)};4900;1200;${e.vorsteuer?9:0}\n`;
  });
  downloadText('steuerberater-paket_demo.csv', csv);
}
/* ---------------------------- Modal + download helpers ---------------------------- */
function openModal(html){
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('active');
}
function closeModal(){ document.getElementById('modal-backdrop').classList.remove('active'); }
document.getElementById('modal-backdrop').addEventListener('click', (e)=>{
  if(e.target.id==='modal-backdrop') closeModal();
});
function downloadText(filename, text){
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
/* ---------------------------- Persistence (localStorage) ---------------------------- */
const STORAGE_KEY = 'solobuch_demo_state_v1';
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    // Speicher nicht verfügbar (z.B. privater Modus) — App funktioniert weiter, nur ohne Persistenz.
    console.warn('Konnte Daten nicht lokal speichern:', e);
  }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const saved = JSON.parse(raw);
    Object.assign(state, saved);
    return true;
  }catch(e){
    console.warn('Konnte gespeicherte Daten nicht laden:', e);
    return false;
  }
}
/* ---------------------------- Boot ---------------------------- */
try{
  var bf = document.getElementById('boot-fallback');
  if(bf) bf.remove();
  const hadSavedData = loadState();
  if(hadSavedData && state.onboarded){
    document.getElementById('onboarding').style.display='none';
    document.getElementById('app-shell').classList.add('active');
    renderApp();
  }else{
    renderOnboarding();
  }
  if('serviceWorker' in navigator){
    try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
  }
}catch(e){
  showBootError((e && e.message) ? e.message : String(e));
}
</script>
